<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>伊藤だいすけ　市民のためのじゃんけんゲーム</title>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap');
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Noto Sans JP', sans-serif;
      background: linear-gradient(135deg, #7f1d1d, #b91c1c, #991b1b);
      color: #fee2e2;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px 10px;
    }

    .container {
      max-width: 960px;
      width: 100%;
      background: rgba(0,0,0,0.4);
      backdrop-filter: blur(8px);
      border-radius: 24px;
      padding: 28px;
      border: 1px solid rgba(248,113,113,0.3);
      box-shadow: 0 15px 40px rgba(0,0,0,0.6);
    }

    h1 {
      text-align: center;
      font-size: 2.8rem;
      margin-bottom: 8px;
      color: #fecaca;
      text-shadow: 0 3px 10px rgba(0,0,0,0.7);
    }

    .score-board {
      display: flex;
      justify-content: center;
      gap: 60px;
      margin: 20px 0 35px;
    }

    .score-label { font-size: 1rem; color: #fca5a5; margin-bottom: 6px; }
    .score-value { font-size: 3rem; font-weight: bold; color: #fef2f2; }

    .battle-area {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 50px;
      margin: 30px 0;
      flex-wrap: wrap;
    }

    .side { text-align: center; flex: 1; min-width: 260px; }
    .side-label { font-size: 1.4rem; margin-bottom: 12px; font-weight: 700; color: #fecaca; }

    .hand-display {
      width: 340px;
      height: 340px;
      margin: 0 auto;
      background: rgba(248,113,113,0.15);
      border-radius: 20px;
      overflow: hidden;
      border: 6px solid rgba(248,113,113,0.45);
      position: relative;
    }

    .hand-display video,
    .hand-display .emoji {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 160px;
    }

    .vs {
      font-size: 5rem;
      font-weight: bold;
      color: #fca5a5;
      opacity: 0.75;
      align-self: center;
    }

    /* 結果テキスト */
    .status {
      text-align: center;
      font-size: 2.4rem;
      margin: 25px 0;
      min-height: 50px;
      color: #fed7d7;
      font-weight: bold;
      text-shadow: 0 3px 10px rgba(0,0,0,0.6);
    }

    .choices {
      display: flex;
      justify-content: center;
      gap: 30px;
      margin: 40px 0 30px;
    }

    .choice-btn {
      width: 110px;
      height: 110px;
      font-size: 3.5rem;
      border: none;
      border-radius: 50%;
      cursor: pointer;
      transition: all 0.25s ease;
      box-shadow: 0 8px 20px rgba(0,0,0,0.5);
      color: white;
    }

    .choice-btn:active {
      transform: scale(0.92);
    }

    #gu-btn { background: #dc2626; }
    #choki-btn { background: #b91c1c; }
    #pa-btn { background: #991b1b; }

    .reset-btn {
      display: none;
      background: #ef4444;
      color: white;
      border: none;
      padding: 14px 55px;
      font-size: 1.6rem;
      border-radius: 999px;
      cursor: pointer;
      margin-top: 10px;
      transition: all 0.3s;
      opacity: 0;
    }

    .reset-btn.show {
      animation: fadeIn 0.4s ease forwards;
    }

    /* アニメーション */
    @keyframes pop {
      0% { transform: scale(0.7); opacity: 0; }
      60% { transform: scale(1.15); opacity: 1; }
      100% { transform: scale(1); }
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* スマホ専用レイアウト */
    @media (max-width: 600px) {

      .battle-area {
        flex-direction: column;
        gap: 20px;
      }

      .hand-display {
        width: 180px;
        height: 180px;
        animation: pop 0.4s ease;
      }

      .vs {
        font-size: 2.4rem;
        margin: 10px 0;
      }

      .status {
        font-size: 1.8rem;
        line-height: 1.3;
        padding: 0 10px;
        animation: fadeIn 0.4s ease;
      }

      .choices {
        flex-direction: column;
        gap: 15px;
      }

      .choice-btn {
        width: 100%;
        max-width: 260px;
        height: 70px;
        border-radius: 12px;
        font-size: 2rem;
      }

      .reset-btn {
        width: 100%;
        max-width: 260px;
        font-size: 1.4rem;
        padding: 12px 0;
      }
    }
  </style>
</head>

<body>
<div class="container">
  <h1>🔥 伊藤だいすけ　市民のためのじゃんけんゲーム 🔥</h1>

  <div class="score-board">
    <div class="score">
      <div class="score-label">あなた</div>
      <div id="player-score" class="score-value">0</div>
    </div>
    <div class="score">
      <div class="score-label">伊藤だいすけ</div>
      <div id="com-score" class="score-value">0</div>
    </div>
  </div>

  <div class="battle-area">
    <div class="side">
      <div class="side-label">あなた</div>
      <div class="hand-display" id="player-hand">
        <div class="emoji">?</div>
      </div>
    </div>

    <div class="vs">VS</div>

    <div class="side">
      <div class="side-label">伊藤だいすけ</div>
      <div class="hand-display" id="com-hand"></div>
    </div>
  </div>

  <div class="status" id="status">どれを出す？</div>

  <div class="choices">
    <button id="gu-btn" class="choice-btn" onclick="play('gu')">✊</button>
    <button id="choki-btn" class="choice-btn" onclick="play('choki')">✌️</button>
    <button id="pa-btn" class="choice-btn" onclick="play('pa')">✋</button>
  </div>

  <button id="reset-btn" class="reset-btn" onclick="resetGame()">もう一度勝負！</button>
</div>

<script>
const hands = {
  gu: { emoji: "✊" },
  choki: { emoji: "✌️" },
  pa: { emoji: "✋" }
};

let playerScore = 0;
let comScore = 0;
let isProcessing = false;

const playerHandEl = document.getElementById("player-hand");
const comHandEl = document.getElementById("com-hand");
const statusEl = document.getElementById("status");
const resetBtn = document.getElementById("reset-btn");
const playerScoreEl = document.getElementById("player-score");
const comScoreEl = document.getElementById("com-score");

function clearHand(el) {
  el.innerHTML = "";
}

function showEmoji(el, choice) {
  el.innerHTML = `<div class="emoji">${hands[choice].emoji}</div>`;
}

function showComputerVideo(filename, onEnded = null) {
  clearHand(comHandEl);
  const v = document.createElement("video");
  v.muted = true;
  v.playsInline = true;
  v.autoplay = true;
  v.loop = false;
  v.src = `videos/${filename}`;

  v.addEventListener("loadeddata", () => v.play().catch(()=>{}));
  if (onEnded) v.addEventListener("ended", onEnded, { once: true });

  comHandEl.appendChild(v);
}

function play(playerChoice) {
  if (isProcessing) return;
  isProcessing = true;

  resetBtn.style.display = "none";
  resetBtn.classList.remove("show");

  statusEl.textContent = "じゃん…けん…ぽん！";

  showEmoji(playerHandEl, playerChoice);

  const choices = ["gu", "choki", "pa"];
  const comChoice = choices[Math.floor(Math.random() * 3)];

  setTimeout(() => {
    showComputerVideo(`computer_${comChoice}.mp4`, () => {
      determineResult(playerChoice, comChoice);
    });
  }, 700);
}

function determineResult(playerChoice, comChoice) {
  let result = "draw";

  if (playerChoice !== comChoice) {
    if (
      (playerChoice === "gu" && comChoice === "choki") ||
      (playerChoice === "choki" && comChoice === "pa") ||
      (playerChoice === "pa" && comChoice === "gu")
    ) {
      result = "win";
      playerScore++;
    } else {
      result = "lose";
      comScore++;
    }
  }

  playerScoreEl.textContent = playerScore;
  comScoreEl.textContent = comScore;

  const resultFile = `result_${playerChoice}_${result}.mp4`;

  showComputerVideo(resultFile, () => {
    showResultText(result);
  });
}

function showResultText(result) {
  if (result === "win") {
    statusEl.textContent = "あなたの勝ち！🔥";
  } else if (result === "lose") {
    statusEl.textContent = "あなたの負け…";
  } else {
    statusEl.textContent = "あいこ！";
  }

  resetBtn.style.display = "inline-block";
  resetBtn.classList.add("show");
}

function resetGame() {
  isProcessing = false;
  statusEl.textContent = "どれを出す？";

  playerHandEl.innerHTML = '<div class="emoji">?</div>';
  clearHand(comHandEl);

  resetBtn.style.display = "none";
  resetBtn.classList.remove("show");
}
</script>
</body>
</html>
